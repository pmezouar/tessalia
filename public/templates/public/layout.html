{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}Tessalia - Comprendre la douleur pédiatrique</title>

    <!-- ICONS -->
    <link rel="shortcut icon" href="{% static 'public/images/icon.ico' %}" type="image/x-icon">
    <link rel="shortcut icon" href="{% static 'public/images/icon.png' %}" type="image/x-png">

    <!-- STYLES -->
    <link rel="stylesheet" href="{% static 'public/css/index.css' %}">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- BOOTSTRAP ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    {% block body %}{% endblock %}

    <script src="{% static 'public/js/index.js' %}"></script>
</body>

</html>
